<div class="img-container" [class.small-pic]="bigPicSrc() && !bigPicClickShowDisabled()" (click)="clickImgContainer()">
  @if (loading()) {
    <img
      [src]="loadingSrc()"
      (wheel)="onSmallPicWheel($event)"
      (pointerdown)="onSmallPicPointerDown($event)"
      (pointermove)="onSmallPicPointerMove($event)"
      (pointerup)="onSmallPicPointerUp($event)"
    />
  }
  @if (error()) {
    <img
      [src]="emptySrc()"
      (wheel)="onSmallPicWheel($event)"
      (pointerdown)="onSmallPicPointerDown($event)"
      (pointermove)="onSmallPicPointerMove($event)"
      (pointerup)="onSmallPicPointerUp($event)"
    />
  }
  @if (currSrc(); as currSrc) {
    <img
      [src]="currSrc"
      [class.hidden]="loading() || error()"
      [style.object-fit]="objectFit()"
      (wheel)="onSmallPicWheel($event)"
      (pointerdown)="onSmallPicPointerDown($event)"
      (pointermove)="onSmallPicPointerMove($event)"
      (pointerup)="onSmallPicPointerUp($event)"
      (load)="onLoad($event)"
      (error)="onError($event)"
    />
  } @else {
    <img
      [src]="emptySrc()"
      (wheel)="onSmallPicWheel($event)"
      (pointerdown)="onSmallPicPointerDown($event)"
      (pointermove)="onSmallPicPointerMove($event)"
      (pointerup)="onSmallPicPointerUp($event)"
    />
  }
</div>

@if (currBigPicSrc(); as currBigPicSrc) {
  <div #bigPicDiv class="big-pic" style="display: none" (pointerup)="hideBigPic()">
    @if (bigPicVisible()) {
      <div class="big-pic-container" (animate.enter)="onBigPicEnter($event)" (animate.leave)="onBigPicLeave($event)">
        <img
          [src]="currBigPicSrc"
          [style.object-fit]="objectFit()"
          (wheel)="onBigPicWheel($event)"
          (pointerdown)="onBigPicPointerDown($event)"
          (pointermove)="onBigPicPointerMove($event)"
          (pointerup)="onBigPicPointerUp($event)"
        />
      </div>
    }
  </div>
}
